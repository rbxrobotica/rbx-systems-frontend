name: Guardrails

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download gitleaks v8.30.1
        run: |
          curl -sSfL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks
      - name: Run gitleaks
        run: ./gitleaks detect --source . --no-banner --redact -v

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download osv-scanner v2.4.0
        run: |
          curl -sSfL -o osv-scanner "https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64"
          chmod +x osv-scanner
      - name: Run osv-scanner on pnpm-lock.yaml
        run: ./osv-scanner scan source --lockfile pnpm-lock.yaml .
